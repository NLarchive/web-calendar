name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Generate build version manifest
        run: |
          cat > version.json << 'JSON'
          {
            "version": "${{ github.sha }}",
            "sha": "${{ github.sha }}",
            "buildId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "generatedAt": "${{ github.event.head_commit.timestamp || github.run_id }}"
          }
          JSON

      - name: Prepare deployment artifact
        run: |
          mkdir -p _site
          rsync -av --exclude='node_modules' \
                    --exclude='tests' \
                    --exclude='.github' \
                    --exclude='.vscode' \
                    --exclude='scripts' \
                    --exclude='package-lock.json' \
                    --exclude='vitest.config.js' \
                    --exclude='playwright.config.js' \
                    --exclude='project-tasks-state.json' \
                    --exclude='AGENTS.md' \
                    --exclude='_site' \
                    . _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
